<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Superwriter Frontend</title>
    <!-- VSCode Theme CSS (Light) -->
    <link rel="stylesheet" href="/src/styles/vscode-light-theme.css" />
    <link rel="stylesheet" href="/src/styles/codicon.css" />
    <link rel="stylesheet" href="/src/styles/title-bar.css" />
    <link rel="stylesheet" href="/src/styles/activity-bar.css" />
    <link rel="stylesheet" href="/src/styles/sidebar.css" />
    <link rel="stylesheet" href="/src/styles/editor-tabs.css" />
    <link rel="stylesheet" href="/src/styles/status-bar.css" />
    <link rel="stylesheet" href="/src/styles/panel.css" />
    <style>
      /* App Shell — VSCode-style layout */
      .app-shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      .app-workbench {
        display: flex;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .app-main {
        display: flex;
        flex: 1;
        min-width: 0;
        flex-direction: column;
        overflow: hidden;
        background: var(--vscode-editor-background);
      }

      /* Editor area (used by EditorView) */
      .app-editor-area {
        display: flex;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .editor-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        overflow: hidden;
      }

      .editor-toolbar {
        padding: 6px 12px;
        border-bottom: 1px solid var(--vscode-panel-border);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        background: var(--vscode-editor-background);
      }

      .editor-toolbar .dirty-indicator {
        font-size: 12px;
        color: #f0ad4e;
        align-self: center;
      }

      .editor-content {
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .monaco-wrapper {
        flex: 1;
        min-height: 400px;
      }

      .monaco-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--vscode-activityBar-inactiveForeground);
      }

      .editor-empty {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--vscode-activityBar-inactiveForeground);
        font-size: 13px;
      }

      /* Sidebar helpers */
      .sidebar-folder-btn {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 2px 6px;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--vscode-editor-foreground);
        border-radius: 4px;
        font-size: 11px;
      }

      .sidebar-folder-btn:hover {
        background: var(--vscode-tree-hoverBackground);
      }

      .sidebar-folder-path {
        font-size: 10px;
        color: var(--vscode-activityBar-inactiveForeground);
        word-break: break-all;
        margin-bottom: 4px;
      }

      /* Chat in right sidebar */
      .chat-sidebar {
        width: 300px;
        flex-shrink: 0;
        background: var(--vscode-sideBar-background);
        border-left: 1px solid var(--vscode-panel-border);
        display: flex;
        flex-direction: column;
      }

      /* Welcome View */
      .welcome-view {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100%;
        padding: 2rem;
      }

      .welcome-card {
        max-width: 420px;
        width: 100%;
        text-align: center;
        background: var(--vscode-sideBar-background);
        border: 1px solid var(--vscode-panel-border);
        border-radius: 8px;
        padding: 2rem;
      }

      .welcome-logo {
        width: 56px;
        height: 56px;
        background: var(--vscode-activityBar-activeBorder);
        color: #fff;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 700;
        margin: 0 auto 1.5rem;
      }

      .welcome-card h2 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        color: var(--vscode-editor-foreground);
      }

      .welcome-subtitle {
        color: var(--vscode-activityBar-inactiveForeground);
        margin: 0 0 2rem;
        font-size: 0.9rem;
      }

      .welcome-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .form-group { text-align: left; }

      .form-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        margin-bottom: 0.4rem;
        color: var(--vscode-editor-foreground);
      }

      .form-input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid var(--vscode-input-border);
        border-radius: 6px;
        font-size: 0.95rem;
        box-sizing: border-box;
        background: var(--vscode-input-background);
        color: var(--vscode-input-foreground);
      }

      .form-input:focus {
        outline: none;
        border-color: var(--vscode-inputOption-activeBorder);
      }

      .btn-lg {
        padding: 0.7rem 1.5rem;
        font-size: 1rem;
      }

      .welcome-error {
        color: #f48771;
        font-size: 0.85rem;
        margin: 0;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        padding: 0.5rem 1rem;
        border: 1px solid var(--vscode-button-secondaryBackground);
        border-radius: 4px;
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
        font-size: 0.875rem;
        cursor: pointer;
      }

      .btn:hover {
        background: var(--vscode-button-secondaryHoverBackground);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border-color: transparent;
      }

      .btn-primary:hover {
        background: var(--vscode-button-hoverBackground);
      }

      /* Surface panels (used by views) */
      .surface-panel {
        background: var(--vscode-editorWidget-background);
        border: 1px solid var(--vscode-editorWidget-border);
        border-radius: 8px;
        padding: 1.25rem;
      }

      .surface-panel-error {
        border-color: #f48771;
        background: rgba(244, 135, 113, 0.1);
      }

      .surface-panel-error h2 {
        color: #f48771;
      }

      /* Skills view */
      .skill-select-btn {
        width: 100%;
        text-align: left;
        padding: 0.75rem 1rem;
        border: 1px solid var(--vscode-panel-border);
        border-radius: 6px;
        background: var(--vscode-sideBar-background);
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--vscode-editor-foreground);
      }

      .skill-select-btn:hover {
        border-color: var(--vscode-focusBorder);
      }

      .version-active {
        border-color: var(--vscode-focusBorder);
        background: var(--vscode-tree-selectionBackground);
      }

      .version-scope {
        font-size: 0.75rem;
        color: var(--vscode-activityBar-inactiveForeground);
      }

      .version-instruction {
        white-space: pre-wrap;
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--vscode-editor-foreground);
        margin-bottom: 1rem;
      }

      .proposal-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }

      .inline-form {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-top: 1rem;
      }

      .command-center {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding: 16px;
      }

      .object-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .status-pill {
        font-size: 0.8rem;
        color: var(--vscode-statusBar-foreground);
        background: var(--vscode-statusBar-background);
        padding: 2px 8px;
        border-radius: 12px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
