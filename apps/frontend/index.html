<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Superwriter Frontend</title>
    <style>
      .editor-layout { display: flex; height: 100%; }
      .editor-filetree { width: 240px; flex-shrink: 0; border-right: 1px solid #e0e0e0; overflow-y: auto; }
      .editor-monaco { flex: 1; min-width: 0; display: flex; flex-direction: column; }
      .filetree-header { padding: 0.75rem 1rem; border-bottom: 1px solid #e0e0e0; }
      .filetree-header h3 { margin: 0; font-size: 13px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
      .filetree-nav { padding: 0.5rem 0; }
      .filetree-root, .tree-children { list-style: none; margin: 0; padding: 0; }
      .tree-node-btn { display: flex; align-items: center; gap: 4px; width: 100%; border: none; background: none; cursor: pointer; padding: 4px 8px; font-size: 13px; text-align: left; }
      .tree-node-btn:hover { background: #f5f5f5; }
      .tree-node-btn-selected { background: #e3f2fd !important; font-weight: 500; }
      .tree-chevron { font-size: 10px; width: 12px; color: #999; }
      .tree-icon { font-size: 14px; }
      .tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .monaco-wrapper { flex: 1; min-height: 400px; }
      .monaco-loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #666; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
